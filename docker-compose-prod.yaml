services:
  proxy:
    extends:
      file: docker-compose.yaml
      service: proxy
    volumes:
      - ./server/nginx_prod.conf.template:/etc/nginx/templates/nginx.conf.template:ro,z
    depends_on:
      inference-0:
        condition: service_healthy
      inference-1:
        condition: service_healthy
      inference-2:
        condition: service_healthy
      inference-3:
        condition: service_healthy


  # 4 GPU vLLM inference using gemma-4-E4B-it
  # requires the exact number of CUDA devices and accesss to Hugging Face
  # for pulling the model.

  # GPU 0 Instance
  inference-0: &inference-base
    image: vllm/vllm-openai:v0.22.0
    command: >
      google/gemma-4-E4B-it
      --gpu-memory-utilization 0.95
      --max-model-len 31504
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      --port ${INFERENCE_SERVER_PORT:-8100}
      --enable-auto-tool-choice
      --enable-prefix-caching
      --enable-chunked-prefill
      --kv-cache-dtype auto
      --chat-template examples/tool_chat_template_gemma4.jinja
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    healthcheck: # Loading weights takes a lot of time
      test: ["CMD-SHELL", "curl -f http://localhost:${INFERENCE_SERVER_PORT:-8100}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # GPU 1 Instance
  inference-1:
    <<: *inference-base
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]

  # GPU 2 Instance
  inference-2:
    <<: *inference-base
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['2']
              capabilities: [gpu]

  # GPU 3 Instance
  inference-3:
    <<: *inference-base
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['3']
              capabilities: [gpu]

  server:
    extends:
      file: docker-compose.yaml
      service: server
    environment:
      ENV: production
      LOGDETECTIVE_SERVER_PORT: 443
    ports:
      - "443:443"
  postgres:
    extends:
      file: docker-compose.yaml
      service: postgres
  packit-interface:
    extends:
      file: docker-compose.yaml
      service: packit-interface

volumes:
  database_data:
    driver: local
